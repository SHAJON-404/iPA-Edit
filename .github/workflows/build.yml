name: Build Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: ipa-edit-windows.exe
            pyinstaller_name: ipa-edit.exe
          - os: macos-latest
            artifact_name: ipa-edit-macos
            pyinstaller_name: ipa-edit
          - os: ubuntu-latest
            artifact_name: ipa-edit-linux
            pyinstaller_name: ipa-edit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary
        run: pyinstaller --onefile --name ipa-edit --clean ipa-edit.py

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Rename-Item dist\ipa-edit.exe ${{ matrix.artifact_name }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: mv dist/ipa-edit dist/${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Compute checksums
        id: hashes
        run: |
          WIN=$(sha256sum dist/ipa-edit-windows.exe | awk '{print $1}')
          MAC=$(sha256sum dist/ipa-edit-macos      | awk '{print $1}')
          LIN=$(sha256sum dist/ipa-edit-linux      | awk '{print $1}')
          echo "win=$WIN" >> $GITHUB_OUTPUT
          echo "mac=$MAC" >> $GITHUB_OUTPUT
          echo "lin=$LIN" >> $GITHUB_OUTPUT

      - name: Get previous tag
        id: prev
        run: |
          PREV=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -n1)
          echo "tag=$PREV" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: log
        run: |
          if [ -n "${{ steps.prev.outputs.tag }}" ]; then
            LOG=$(git log ${{ steps.prev.outputs.tag }}..${{ github.ref_name }} \
              --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" \
              --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" \
              --no-merges | head -20)
          fi
          echo "entries<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG"         >> $GITHUB_OUTPUT
          echo "EOF"          >> $GITHUB_OUTPUT

      - name: Build release notes
        run: |
          cat > notes.md << 'MD'
          ## iPA Edit ${{ github.ref_name }}

          > Released on **$(date -u '+%Y-%m-%d')**

          ---

          ### 📦 Downloads

          | Platform | File | SHA-256 |
          |:--|:--|:--|
          | 🪟 Windows | `ipa-edit-windows.exe` | `${{ steps.hashes.outputs.win }}` |
          | 🍎 macOS   | `ipa-edit-macos`       | `${{ steps.hashes.outputs.mac }}` |
          | 🐧 Linux   | `ipa-edit-linux`       | `${{ steps.hashes.outputs.lin }}` |

          > **macOS / Linux:** run `chmod +x ipa-edit-*` before first use.

          ---

          ### 🔄 What's Changed

          ${{ steps.log.outputs.entries }}

          ---

          <p align="center">
          Made with ❤️ by <a href="https://github.com/SHAJON-404">SHAJON-404</a> · <a href="https://shajon.dev">shajon.dev</a>
          </p>
          MD

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: notes.md
          files: |
            dist/ipa-edit-windows.exe
            dist/ipa-edit-macos
            dist/ipa-edit-linux
          draft: false
          prerelease: false
