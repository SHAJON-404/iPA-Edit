name: Build Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            binary_src: ipa-edit.exe
            binary_dest: ipa-edit.exe
            zip_name: iPA-Edit-windows.zip
          - os: macos-latest
            binary_src: ipa-edit
            binary_dest: ipa-edit
            zip_name: iPA-Edit-macos.zip
          - os: ubuntu-latest
            binary_src: ipa-edit
            binary_dest: ipa-edit
            zip_name: iPA-Edit-linux.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary
        run: pyinstaller --onefile --name ipa-edit --clean ipa-edit.py

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pkg = "staging\iPA-Edit"
          New-Item -ItemType Directory -Force -Path $pkg | Out-Null

          # Copy repo assets (exclude dev/build artifacts and ipa-edit.py)
          $exclude = @('.git','.github','__pycache__','.temp','Signed','Unsigned',
                       'tweaks_extracted','build','dist','*.spec','ipa-edit.py')
          Get-ChildItem -Force | Where-Object { $_.Name -notin $exclude } |
            Copy-Item -Destination $pkg -Recurse -Force

          # Ensure key dirs exist (empty placeholders)
          New-Item -ItemType Directory -Force -Path "$pkg\certificate" | Out-Null
          New-Item -ItemType Directory -Force -Path "$pkg\tweaks"       | Out-Null
          New-Item -ItemType Directory -Force -Path "$pkg\Signed"       | Out-Null
          New-Item -ItemType Directory -Force -Path "$pkg\Unsigned"     | Out-Null

          # Place binary (replaces ipa-edit.py)
          Copy-Item dist\${{ matrix.binary_src }} $pkg\${{ matrix.binary_dest }}

          Compress-Archive -Path $pkg -DestinationPath ${{ matrix.zip_name }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          PKG="staging/iPA-Edit"
          mkdir -p "$PKG"

          # Copy repo assets (exclude dev/build artifacts and ipa-edit.py)
          for item in $(ls -A); do
            case "$item" in
              .git|.github|__pycache__|.temp|Signed|Unsigned|tweaks_extracted|build|dist|*.spec|ipa-edit.py) continue ;;
            esac
            cp -r "$item" "$PKG/" 2>/dev/null || true
          done

          # Ensure key dirs exist (empty placeholders)
          mkdir -p "$PKG/certificate" "$PKG/tweaks" "$PKG/Signed" "$PKG/Unsigned"

          # Place binary (replaces ipa-edit.py)
          cp dist/${{ matrix.binary_src }} "$PKG/${{ matrix.binary_dest }}"
          chmod +x "$PKG/${{ matrix.binary_dest }}"

          cd staging && zip -r ../${{ matrix.zip_name }} iPA-Edit/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.zip_name }}
          path: ${{ matrix.zip_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Compute checksums
        id: hashes
        run: |
          WIN=$(sha256sum dist/iPA-Edit-windows.zip | awk '{print $1}')
          MAC=$(sha256sum dist/iPA-Edit-macos.zip   | awk '{print $1}')
          LIN=$(sha256sum dist/iPA-Edit-linux.zip   | awk '{print $1}')
          echo "win=$WIN" >> $GITHUB_OUTPUT
          echo "mac=$MAC" >> $GITHUB_OUTPUT
          echo "lin=$LIN" >> $GITHUB_OUTPUT

      - name: Get previous tag
        id: prev
        run: |
          PREV=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -n1)
          echo "tag=$PREV" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: log
        run: |
          if [ -n "${{ steps.prev.outputs.tag }}" ]; then
            LOG=$(git log ${{ steps.prev.outputs.tag }}..${{ github.ref_name }} \
              --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" \
              --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" \
              --no-merges | head -20)
          fi
          echo "entries<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG"         >> $GITHUB_OUTPUT
          echo "EOF"          >> $GITHUB_OUTPUT

      - name: Build release notes
        run: |
          DATE=$(date -u '+%Y-%m-%d')
          cat > notes.md << MD
          ## iPA Edit ${{ github.ref_name }}

          > Released on **${DATE}**

          ---

          ### 📦 Downloads

          | Platform | File | SHA-256 |
          |:--|:--|:--|
          | 🪟 Windows | \`iPA-Edit-windows.zip\` | \`${{ steps.hashes.outputs.win }}\` |
          | 🍎 macOS   | \`iPA-Edit-macos.zip\`   | \`${{ steps.hashes.outputs.mac }}\` |
          | 🐧 Linux   | \`iPA-Edit-linux.zip\`   | \`${{ steps.hashes.outputs.lin }}\` |

          > Each zip contains the full tool structure with the executable replacing \`ipa-edit.py\`.
          > **macOS / Linux:** run \`chmod +x ipa-edit\` inside the extracted folder if needed.

          ---

          ### 🔄 What's Changed

          ${{ steps.log.outputs.entries }}

          ---

          <p align="center">
          Made with ❤️ by <a href="https://github.com/SHAJON-404">SHAJON-404</a> · <a href="https://shajon.dev">shajon.dev</a>
          </p>
          MD

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: notes.md
          files: |
            dist/iPA-Edit-windows.zip
            dist/iPA-Edit-macos.zip
            dist/iPA-Edit-linux.zip
          draft: false
          prerelease: false
